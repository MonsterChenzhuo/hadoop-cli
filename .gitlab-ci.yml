stages:
  - test
  - release

variables:
  GO_VERSION: "1.23"

workflow:
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

.go-base:
  image: golang:${GO_VERSION}
  before_script:
    - go mod download

test:
  extends: .go-base
  stage: test
  script:
    - go vet ./...
    - test -z "$(gofmt -l .)"
    - go test ./... -race
    - go build -o bin/hadoop-cli .
    - ./bin/hadoop-cli --help
    - |
      for f in skills/*/SKILL.md; do
        head -n 20 "$f" | grep -q '^name: ' || (echo "missing name in $f"; exit 1)
        head -n 20 "$f" | grep -q '^description: ' || (echo "missing description in $f"; exit 1)
      done

release:
  image: golang:${GO_VERSION}
  stage: release
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE == "push"
  needs: ["test"]
  variables:
    GIT_DEPTH: 0
    GIT_STRATEGY: clone
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends curl ca-certificates git
    - curl -sfL https://goreleaser.com/static/run -o /usr/local/bin/goreleaser && chmod +x /usr/local/bin/goreleaser
    - git config user.email "gitlab-ci@${CI_SERVER_HOST}"
    - git config user.name  "gitlab-ci"
    - |
      if [ -z "$GITLAB_TOKEN" ]; then
        echo "GITLAB_TOKEN is required (Project Access Token with api + write_repository)" >&2
        exit 1
      fi
    - git remote set-url origin "https://oauth2:${GITLAB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
  script:
    - git fetch --tags --force origin
    - |
      latest=$(git tag -l 'v*' --sort=-v:refname | head -n1)
      latest=${latest:-v0.0.0}
      ver=${latest#v}
      major=${ver%%.*}; rest=${ver#*.}
      minor=${rest%%.*}; patch=${rest#*.}
      next="v${major}.${minor}.$((patch+1))"
      echo "latest tag: $latest -> next: $next"
      echo "NEXT_TAG=$next" >> release.env
    - source release.env
    - git tag -a "$NEXT_TAG" -m "$NEXT_TAG"
    - git push origin "$NEXT_TAG"
    - goreleaser release --clean
  artifacts:
    paths:
      - dist/*.tar.gz
      - dist/*_checksums.txt
      - dist/hadoop-cli_*
    expire_in: 1 month
    reports:
      dotenv: release.env
