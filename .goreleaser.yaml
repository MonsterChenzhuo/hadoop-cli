version: 2
project_name: hadoop-cli

before:
  hooks:
    - go mod tidy

builds:
  - id: hadoop-cli
    main: ./
    binary: hadoop-cli
    env:
      - CGO_ENABLED=0
    goos:   [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/hadoop-cli/hadoop-cli/cmd.Version={{.Version}}

archives:
  - id: targz
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
      - skills/**/*
  - id: binary
    format: binary
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"

changelog:
  sort: asc
